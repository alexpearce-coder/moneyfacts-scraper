name: moneyfacts-scraper-history

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python scrape_moneyfacts.py
        env:
          OUTPUT_DIR: data
      - name: Validate ranking
        run: |
          python - <<'PY'
          import csv
          from decimal import Decimal

          with open("data/latest.csv", newline="", encoding="utf-8") as f:
              rows = list(csv.DictReader(f))

          if not rows:
              raise SystemExit("no rows written")

          aer_values = [Decimal(r["aer"]) for r in rows]
          if aer_values != sorted(aer_values, reverse=True):
              raise SystemExit("rows are not sorted by AER descending")

          if rows[0]["rank"] != "1":
              raise SystemExit("top row is not rank 1")

          with open("data/moneyfacts-scraper-history.csv", newline="", encoding="utf-8") as f:
              history = list(csv.DictReader(f))

          if not history:
              raise SystemExit("history is empty")

          required = {"scrape_date", "rank", "provider", "product_name", "aer", "duplicate_key"}
          if not required.issubset(history[0].keys()):
              raise SystemExit("history columns are missing")

          print("validation ok")
          PY
      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "Update Moneyfacts snapshot"
          git push
